name: Daily Fact

on:
  schedule:
    - cron: '0 1 * * *'  # 1am UTC = 1am Iceland time (UTC+0, no DST)
  workflow_dispatch:      # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate daily fact
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 .github/scripts/generate_fact.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fact.json
          git diff --staged --quiet || git commit -m "Dagleg staðreynd $(date -u +%Y-%m-%d)"
          git push
